[tools]
go = "1.26"

[tasks.build]
description = "Build the pinchy binary into ./bin/pinchy"
run = """
VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
go build -ldflags "-X main.version=$VERSION" -o bin/pinchy ./cmd/pinchy
"""

[tasks.test]
description = "Run unit tests"
run = "go test ./..."

[tasks.clean]
description = "Remove build artefacts"
run = "rm -rf bin/"

[tasks."images:console"]
description = "Build only the console image locally"
run = """
REGISTRY=${REGISTRY:-ghcr.io/nickschuch}
CONSOLE_IMAGE=${CONSOLE_IMAGE:-$REGISTRY/pinchy-console:latest}
docker build --no-cache -t $CONSOLE_IMAGE -f images/console/Dockerfile .
"""

[tasks."images:llmproxy"]
description = "Build only the llmproxy image locally"
run = """
REGISTRY=${REGISTRY:-ghcr.io/nickschuch}
LLMPROXY_IMAGE=${LLMPROXY_IMAGE:-$REGISTRY/pinchy-llmproxy:latest}
docker build --no-cache -t $LLMPROXY_IMAGE images/llmproxy
"""

[tasks.images]
description = "Build all images (agent, docker, proxy, console, llmproxy)"
depends = ["images:console", "images:llmproxy"]
run = """
REGISTRY=${REGISTRY:-ghcr.io/nickschuch}
AGENT_IMAGE=${AGENT_IMAGE:-$REGISTRY/pinchy-agent:latest}
DOCKER_IMAGE=${DOCKER_IMAGE:-$REGISTRY/pinchy-docker:latest}
PROXY_IMAGE=${PROXY_IMAGE:-$REGISTRY/pinchy-proxy:latest}
docker build --no-cache -t $AGENT_IMAGE images/agent
docker build --no-cache -t $DOCKER_IMAGE images/docker
docker build --no-cache -t $PROXY_IMAGE images/proxy
"""
